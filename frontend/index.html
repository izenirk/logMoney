<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Финансовый менеджер | Управляй своими деньгами</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Vendors -->
    <script src="js/vendors/axios.min.js"></script>
    <script src="js/vendors/chart.js"></script>
</head>
<body>
<div id="app">
    <!-- Экран авторизации -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo">💰</div>
                    <h1>Финансовый менеджер</h1>
                    <p>Управляйте своими финансами легко и удобно</p>
                </div>

                <div class="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Вход</button>
                    <button class="tab-btn" data-tab="register">Регистрация</button>
                </div>

                <!-- Форма входа -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="ivan@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Войти</button>
                </form>

                <!-- Форма регистрации -->
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" id="register-name" placeholder="Иван Иванов" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" placeholder="ivan@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="register-password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Подтвердите пароль</label>
                        <input type="password" id="register-password-confirmation" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary btn-block">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="app-screen" style="display: none;">
        <!-- Мобильное меню -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

        <!-- Боковое меню -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">💰</div>
                <h2>Финансы</h2>
                <button class="close-menu" id="closeMenuBtn">&times;</button>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" data-page="dashboard" class="nav-link active">
                    <span class="nav-icon">📊</span>
                    <span>Главная</span>
                </a>
                <a href="#transactions" data-page="transactions" class="nav-link">
                    <span class="nav-icon">💸</span>
                    <span>Транзакции</span>
                </a>
                <a href="#accounts" data-page="accounts" class="nav-link">
                    <span class="nav-icon">🏦</span>
                    <span>Счета</span>
                </a>
                <a href="#budgets" data-page="budgets" class="nav-link">
                    <span class="nav-icon">🎯</span>
                    <span>Бюджет</span>
                </a>
                <a href="#categories" data-page="categories" class="nav-link">
                    <span class="nav-icon">📁</span>
                    <span>Категории</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar">👤</div>
                    <div class="user-name" id="userName"></div>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <span>🚪</span>
                    <span>Выйти</span>
                </button>
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <div class="content-header">
                <h1 id="pageTitle">Главная</h1>
            </div>
            <div id="pageContent">
                <div class="loading">Загрузка...</div>
            </div>
        </main>
    </div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalTitle"></h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- Главный JS файл -->
<script type="module" src="js/main.js"></script>
</body>
</html>
